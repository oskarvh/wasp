ll="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.3854" x="12" y="86.1018">(wasp_client.py discover)</text><rect fill="#E2E2F0" height="52.1358" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="81.3117" x="318.5971" y="45.0679"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="48.2018" x="335.152" y="67.0339">Node A</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.3117" x="325.5971" y="86.1018">10.0.0.181</text><rect fill="#E2E2F0" height="52.1358" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="81.3117" x="409.9088" y="45.0679"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="48.3558" x="426.3867" y="67.0339">Node B</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="67.3117" x="416.9088" y="86.1018">10.0.0.183</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="496.2205" x="0" y="130.0568"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="496.2205" y1="130.0568" y2="130.0568"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="496.2205" y1="133.0568" y2="133.0568"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="296.8542" x="99.6831" y="118.2038"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="279.4742" x="105.6831" y="136.1008">Presence: UDP broadcast to :4243, every 5 s</text><line style="stroke:#181818;stroke-width:1.0;" x1="94.1927" x2="104.1927" y1="213.0278" y2="209.0278"/><line style="stroke:#181818;stroke-width:1.0;" x1="94.1927" x2="104.1927" y1="213.0278" y2="217.0278"/><line style="stroke:#181818;stroke-width:1.0;" x1="93.1927" x2="358.2529" y1="213.0278" y2="213.0278"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="73.0471" x="110.1927" y="171.8068">ANNOUNCE</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="174.8892" x="110.1927" y="189.5128">['W']['A'][0x0C][ver][features]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.1443" x="110.1927" y="207.2188">[tcp port u16][busy][board_len][board]</text><line style="stroke:#181818;stroke-width:1.0;" x1="94.1927" x2="104.1927" y1="244.7338" y2="240.7338"/><line style="stroke:#181818;stroke-width:1.0;" x1="94.1927" x2="104.1927" y1="244.7338" y2="248.7338"/><line style="stroke:#181818;stroke-width:1.0;" x1="93.1927" x2="449.5646" y1="244.7338" y2="244.7338"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="73.0471" x="110.1927" y="238.9248">ANNOUNCE</text><path d="M98,257.7338 L98,355.7338 L394,355.7338 L394,267.7338 L384,257.7338 L98,257.7338 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M384,257.7338 L384,267.7338 L394,267.7338 L384,257.7338 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="62.6133" x="104" y="277.3739">discover</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.7241" x="169.9933" y="276.6308">listens for a few intervals and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="85.9691" x="104" y="294.3369">keys nodes by</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="59.9171" x="193.3491" y="294.3369">source IP</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.484" x="253.2661" y="294.3369">.</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="31.3066" x="260.1301" y="295.0799">busy</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="18.109" x="294.8168" y="294.3369">= a</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="217.8542" x="104" y="312.0429">coordinator is connected right now.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="235.7942" x="104" y="329.7489">Broadcasts never cross a router &#8212; this</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="275.2493" x="104" y="347.4549">is LAN-only (WAN unicast is on the roadmap).</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="230.1843" x="156.7865" y="387.0228">every 5 s, forever &#8212; no coordinator required</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="496.2205" x="0" y="426.0988"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="496.2205" y1="426.0988" y2="426.0988"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="496.2205" y1="429.0988" y2="429.0988"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="242.3451" x="126.9377" y="414.2458"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="224.9651" x="132.9377" y="432.1428">Which physical board is 10.0.0.181?</text><polygon fill="#181818" points="347.2529,469.6578,357.2529,473.6578,347.2529,477.6578,351.2529,473.6578" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="93.1927" x2="353.2529" y1="473.6578" y2="473.6578"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="242.0602" x="100.1927" y="467.8488">TCP :4242 &#8212; IDENTIFY [duration_s = 10]</text><polygon fill="#181818" points="104.1927,501.3639,94.1927,505.3639,104.1927,509.3639,100.1927,505.3639" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="98.1927" x2="358.2529" y1="505.3639" y2="505.3639"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="119.8341" x="110.1927" y="499.5549">RESULT (empty ack)</text><path d="M228,518.3639 L228,563.3639 L490,563.3639 L490,528.3639 L480,518.3639 L228,518.3639 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M480,518.3639 L480,528.3639 L490,528.3639 L480,518.3639 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.8512" x="234" y="537.2609">status LED strobes at 10 Hz for 10 s</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="241.4492" x="234" y="554.9669">&#8212; "here I am"; normal pattern resumes</text><!--SRC=[RPBHJjj044NV_HLNVYX92XO1MbMfGkKugOg4tAWbGbMmq6QzmIkS7NTtJN2V-X7zmdv9noP0KIjBrYQ-UsVctF7QbmfJxIJTATlW5KgImcjp0u4L2PlZzyzVYDFqyo9DPkWjflC-NkDiEailpZv-2mgTAwo9_8hk0tUhJIMisC0L8gTjQxCMfLD1m7zxBNKbZ4UO4DbS6-79NfdULhZgMfPQ6HzL3V9TC_qGmY5vUJCbBXTVcU5Xr3x3TyDE5Vz7DVbBTTof9a4m7cDkbLD6gX5u5gmiYLmAv-49evEZa-Dzg0x56pYCnq4Gu-3q50b6JnIkp7BlSYzRxiNyEhm_JB8btyYMQoLypUuP2xoiK97rg8Tli-MgTWs_MvxNfJAxOnPC_l4E37a5gsyA3rhp-40OFY89GvJQUMKS8xUSq5fjeOrNzeufGvYSvRUgSJ1Cm67LO31mL5kfS3OV32BsQbjXdp44Q-Lp4D2EVngZf5VvhW53suXLaqT6xDkoWRJak1mirLoxsn1VQCTIDZcFqmCoPOFUPPoYDhgZon_8i8fdOxEDgFfHe4oETjmWYg8dvlljQ5sLrjRGYnwj-bvhgtA-q6LvMMXPe2eQnrNAtS9ogUVr-D1bc31dn8pv8fbtAHzrxezRZ6LUMzvwCjUSET_EsjGF7fBvClkwEBz0Jsqgtq38s_v3HcqWl7Y0ynmxppsRyj7IYi4BpoRuzAEBYKyjchPWM2ZBKK1imlSyczrmqvNm3D7mRAxUAFT4vGy0]--></g></svg>