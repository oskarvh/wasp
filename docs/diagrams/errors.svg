<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1098px" preserveAspectRatio="none" style="width:564px;height:1098px;background:#FFFFFF;" version="1.1" viewBox="0 0 564 1098" width="564px" zoomAndPan="magnify"><title>Failure paths &#8212; every failure is a one-frame ERROR answer</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="410.4084" x="73.0864" y="29.9659">Failure paths &#8212; every failure is a one-frame ERROR answer</text><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="51" x2="51" y1="79.1358" y2="1091.4344"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="426.5403" x2="426.5403" y1="79.1358" y2="1091.4344"/><rect fill="#E2E2F0" height="33.0679" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="93.6037" x="5" y="45.0679"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="79.6037" x="12" y="67.0339">Coordinator</text><rect fill="#E2E2F0" height="33.0679" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="49.6159" x="402.5403" y="45.0679"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="35.6159" x="409.5403" y="67.0339">Node</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="557.5812" x="0" y="110.9888"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="557.5812" y1="110.9888" y2="110.9888"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="557.5812" y1="113.9888" y2="113.9888"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="126.3721" x="215.6045" y="99.1358"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="108.9921" x="221.6045" y="117.0328">Load-time errors</text><polygon fill="#181818" points="415.3482,154.5479,425.3482,158.5479,415.3482,162.5479,419.3482,158.5479" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="158.5479" y2="158.5479"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.2862" x="58.8019" y="152.7389">LOAD_MODULE (module already loaded)</text><polygon fill="#181818" points="62.8019,186.2539,52.8019,190.2539,62.8019,194.2539,58.8019,190.2539" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="190.2539" y2="190.2539"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="86.0211" x="68.8019" y="184.4449">ERROR [BUSY]</text><path d="M56,203.2539 L56,248.2539 L245,248.2539 L245,213.2539 L235,203.2539 L56,203.2539 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M235,203.2539 L235,213.2539 L245,213.2539 L235,203.2539 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.2702" x="62" y="222.1509">unload first &#8212; loading over</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.6101" x="62" y="239.8569">a loaded module is rejected</text><polygon fill="#181818" points="415.3482,273.3719,425.3482,277.3719,415.3482,281.3719,419.3482,277.3719" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="277.3719" y2="277.3719"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="351.5463" x="58.8019" y="271.5629">LOAD_MODULE, len &gt; CONFIG_WASP_MAX_MODULE_SIZE</text><path d="M301,290.3719 L301,335.3719 L552,335.3719 L552,300.3719 L542,290.3719 L301,290.3719 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M542,290.3719 L542,300.3719 L552,300.3719 L542,290.3719 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.2441" x="307" y="309.2689">network handler</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="40.95" x="411.6241" y="309.2689">drains</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="81.6271" x="455.9541" y="309.2689">the oversized</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="206.4922" x="307" y="326.975">frame &#8212; stream sync is never lost</text><polygon fill="#181818" points="62.8019,360.49,52.8019,364.49,62.8019,368.49,58.8019,364.49" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="364.49" y2="364.49"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="126.7762" x="68.8019" y="358.681">ERROR [TOO_LARGE]</text><polygon fill="#181818" points="415.3482,409.902,425.3482,413.902,415.3482,417.902,419.3482,413.902" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="413.902" y2="413.902"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253.5653" x="58.8019" y="390.387">LOAD_MODULE [invalid wasm, or imports</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="68.9391" x="58.8019" y="408.093">outside the</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="31.3066" x="131.1209" y="408.8361">wasp</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="74.1781" x="165.8076" y="408.093">namespace]</text><polygon fill="#181818" points="62.8019,441.608,52.8019,445.608,62.8019,449.608,58.8019,445.608" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="445.608" y2="445.608"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="286.7933" x="68.8019" y="439.799">ERROR [LOAD_FAILED, WAMR's diagnostic text]</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="557.5812" x="0" y="475.461"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="557.5812" y1="475.461" y2="475.461"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="557.5812" y1="478.461" y2="478.461"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="118.9621" x="219.3095" y="463.608"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="101.5821" x="225.3095" y="481.505">Call-time errors</text><polygon fill="#181818" points="415.3482,519.0201,425.3482,523.0201,415.3482,527.0201,419.3482,523.0201" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="523.0201" y2="523.0201"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.3592" x="58.8019" y="517.2111">CALL "fib" (nothing loaded)</text><polygon fill="#181818" points="62.8019,550.7261,52.8019,554.7261,62.8019,558.7261,58.8019,554.7261" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="554.7261" y2="554.7261"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="134.3552" x="68.8019" y="548.9171">ERROR [NO_MODULE]</text><polygon fill="#181818" points="415.3482,582.4321,425.3482,586.4321,415.3482,590.4321,419.3482,586.4321" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="586.4321" y2="586.4321"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="247.7672" x="58.8019" y="580.6231">CALL "gdc" (typo / missing export_name)</text><polygon fill="#181818" points="62.8019,614.1381,52.8019,618.1381,62.8019,622.1381,58.8019,618.1381" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="618.1381" y2="618.1381"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.9422" x="68.8019" y="612.3291">ERROR [NO_FUNC "gdc"]</text><polygon fill="#181818" points="415.3482,663.5501,425.3482,667.5501,415.3482,671.5501,419.3482,667.5501" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="667.5501" y2="667.5501"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.0112" x="58.8019" y="644.0351">CALL "fib" &#8212; wrong argc, or the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="138.3331" x="58.8019" y="661.7411">C signature isn't all-i32</text><polygon fill="#181818" points="62.8019,695.2562,52.8019,699.2562,62.8019,703.2562,58.8019,699.2562" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="699.2562" y2="699.2562"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="159.4712" x="68.8019" y="693.4472">ERROR [BAD_ARGS, detail]</text><polygon fill="#181818" points="415.3482,744.6682,425.3482,748.6682,415.3482,752.6682,419.3482,748.6682" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="748.6682" y2="748.6682"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="172.1982" x="58.8019" y="725.1532">CALL "boom" &#8212; module hits</text><text fill="#000000" font-family="monospace" font-size="13" lengthAdjust="spacing" textLength="86.0933" x="234.38" y="725.8963">unreachable</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.484" x="320.4733" y="725.1532">,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.5163" x="58.8019" y="742.8592">OOB access, __builtin_trap(), remote segfault&#8230;</text><polygon fill="#181818" points="62.8019,776.3742,52.8019,780.3742,62.8019,784.3742,58.8019,780.3742" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="780.3742" y2="780.3742"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="178.6202" x="68.8019" y="774.5652">ERROR [TRAP, exception text]</text><path d="M303,793.3742 L303,856.3742 L550,856.3742 L550,803.3742 L540,793.3742 L303,793.3742 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M540,793.3742 L540,803.3742 L550,803.3742 L540,793.3742 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="226.6032" x="309" y="812.2712">The sandbox holds: the module stays</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="214.1362" x="309" y="829.9772">loaded, the node is unharmed, and</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.3871" x="309" y="847.6833">the next CALL works.</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="557.5812" x="0" y="883.3453"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="557.5812" y1="883.3453" y2="883.3453"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="557.5812" y1="886.3453" y2="886.3453"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="112.7611" x="222.41" y="871.4923"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="95.3811" x="228.41" y="889.3893">Stream desync</text><polygon fill="#181818" points="415.3482,926.9043,425.3482,930.9043,415.3482,934.9043,419.3482,930.9043" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="51.8019" x2="421.3482" y1="930.9043" y2="930.9043"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.3742" x="58.8019" y="925.0953">bytes that don't start 'W' 'A'</text><path d="M314,943.9043 L314,988.9043 L539,988.9043 L539,953.9043 L529,943.9043 L314,943.9043 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M529,943.9043 L529,953.9043 L539,953.9043 L529,943.9043 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="190.9702" x="320" y="962.8013">bad magic means the stream is</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="204.4642" x="320" y="980.5073">desynchronized &#8212; unrecoverable</text><polygon fill="#181818" points="62.8019,1014.0223,52.8019,1018.0223,62.8019,1022.0223,58.8019,1018.0223" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="56.8019" x2="426.3482" y1="1018.0223" y2="1018.0223"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="57.707" x="68.8019" y="1012.2133">TCP close</text><path d="M56,1031.0223 L56,1076.0223 L227,1076.0223 L227,1041.0223 L217,1031.0223 L56,1031.0223 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M217,1031.0223 L217,1041.0223 L227,1041.0223 L217,1031.0223 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="150.0461" x="62" y="1049.9194">reconnect and start over</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="70.3171" x="62" y="1067.6254">with HELLO</text><!--SRC=[TLJDJjj04BxxAKQ-193JIkqDYKh691J9n2W1qPP4riOxYRVOkzRkf24zyH1zXZuOJz9PsmTemj4xVzzytpScHHN2MAXgOn4QGQM3b-S_WB_Gxc3Lloi70ep6uSgA6c4qdMPJ4DfjqGQbaWWhOsXfdWBtg7GZE0bSAQJPAhtc9fN38E1dKeLgX2O84sEiL5gGiI481ydRyCH8RDydGN1s1gaHSaYA9wErnZeuEmk218PVO0Ada6RnHNwTNTob8pYgZTpmGgAoAEGEAgv4UHnCOCZP2MTts1_ExsRV5u4sX63LkYGmgpQyqRu4LiewQedmdtuBmuJCjUWxGZ-7YR7u4mj2UHXH11LguD7PP7nrcT_7ivlyElxMH_FPrOzHXyBtRuirqjROHoY5bXM_dPn8AvHs9oT0PPVdr6-KSzs9uK4wudMPyvqkF2JjrMEaZlONlysoF8sdbwF5EnG-AFrBL4h2LhWw0cD1rOsnvERQRCXvjJsECEHu4uQW6OHhH86B_M5jtt5ybOuk8hYFhwS31rA9jMPegW329rgq2YUYgjvNE8dJ5CALMePmn6ILNeztbPra_IQBlGvhMN07sZK6FaAjdFEDyCblb_ir3dSRtqsIhdPn69DNO6iDzn9sNRIKCKDpdO1JQ_PuTq5wGE2tL9y_7R0ZyyIYp2AGI7nq-vEMnjJTgDvwfIB7AcmqIr-KObbX64PpdMNd88e2dOiWpvSRLP7IELdH71r7RDRQcytXUYKs5Rqy_ptWa6by4p4j1JQaZEvLUcNI0E2M7U3Oe7ppK9fAkjFM53qqHsBdEAlJA6f3ca_QUtEZIs5h_yhbdDF6U4AtfdU- -n2Wbk07jjwOTUQMsDhxZJ6MEqB7BGI1D9vWdcm91lS36CI3_mvhoNTTYpNxhaR-TxMJ-yDHREwkVyaw-kjgcVRS5hxUi_kAgDla1We-Bppm0_4LMlCVmU_Nu-d-7Lj59NmTfMds3m00]--></g></svg>