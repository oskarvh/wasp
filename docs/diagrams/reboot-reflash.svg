e new firmware</text><text fill="#000000" font-family="sans-serif" font-size="11" lengthAdjust="spacing" textLength="27.0048" x="282.3637" y="808.2909">~20 s</text><line style="stroke:#181818;stroke-width:1.0;" x1="282.9951" x2="292.9951" y1="849.2199" y2="845.2199"/><line style="stroke:#181818;stroke-width:1.0;" x1="282.9951" x2="292.9951" y1="849.2199" y2="853.2199"/><line style="stroke:#181818;stroke-width:1.0;" x1="281.9951" x2="552.5413" y1="849.2199" y2="849.2199"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.1062" x="298.9951" y="843.4109">ANNOUNCE (new firmware online)</text><path d="M43,862.2199 L43,925.2199 L272,925.2199 L272,872.2199 L262,862.2199 L43,862.2199 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M262,862.2199 L262,872.2199 L272,872.2199 L262,862.2199 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.5983" x="49" y="881.117">the BOOTSEL-button dance is only</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="180.1151" x="49" y="898.823">needed for the very first flash</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="120.2111" x="49" y="916.529">(or a bricked board)</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="710.7495" x="0" y="952.191"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="710.7495" y1="952.191" y2="952.191"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="710.7495" y1="955.191" y2="955.191"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="294.5142" x="208.1176" y="940.338"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="277.1342" x="214.1176" y="958.235">mode 1 on a board with no USB boo