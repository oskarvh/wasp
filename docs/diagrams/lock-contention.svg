<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="1329px" preserveAspectRatio="none" style="width:766px;height:1329px;background:#FFFFFF;" version="1.1" viewBox="0 0 766 1329" width="766px" zoomAndPan="magnify"><title>Lock contention &#8212; fail-fast, queued grants, lease expiry</title><defs/><g><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="389.1845" x="184.6299" y="29.9659">Lock contention &#8212; fail-fast, queued grants, lease expiry</text><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="36" x2="36" y1="98.2038" y2="1150.9143"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:1.0,4.0;" x1="36" x2="36" y1="1150.9143" y2="1193.8962"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="36" x2="36" y1="1193.8962" y2="1322.7203"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="253.6104" x2="253.6104" y1="98.2038" y2="1150.9143"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:1.0,4.0;" x1="253.6104" x2="253.6104" y1="1150.9143" y2="1193.8962"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="253.6104" x2="253.6104" y1="1193.8962" y2="1322.7203"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="492.5264" x2="492.5264" y1="98.2038" y2="1150.9143"/><line style="stroke:#A80036;stroke-width:1.0;stroke-dasharray:1.0,4.0;" x1="492.5264" x2="492.5264" y1="1150.9143" y2="1193.8962"/><line style="stroke:#181818;stroke-width:0.5;stroke-dasharray:5.0,5.0;" x1="492.5264" x2="492.5264" y1="1193.8962" y2="1322.7203"/><rect fill="#E2E2F0" height="33.0679" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="62.2018" x="5" y="64.1358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="48.2018" x="12" y="86.1018">Node A</text><rect fill="#E2E2F0" height="52.1358" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="170.0434" x="168.6104" y="45.0679"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="79.6037" x="213.8302" y="67.0339">Coordinator</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.0434" x="175.6104" y="86.1018">(all lock state lives here)</text><rect fill="#E2E2F0" height="33.0679" rx="2.5" ry="2.5" style="stroke:#181818;stroke-width:0.5;" width="62.3558" x="461.5264" y="64.1358"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="48.3558" x="468.5264" y="86.1018">Node B</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="759.4443" x="0" y="130.0568"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="759.4443" y1="130.0568" y2="130.0568"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="759.4443" y1="133.0568" y2="133.0568"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="404.5462" x="177.449" y="118.2038"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="387.1662" x="183.449" y="136.1008">Fail-fast (default): contention is an error, never a silent wait</text><polygon fill="#181818" points="241.6321,173.6158,251.6321,177.6158,241.6321,181.6158,245.6321,177.6158" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="36.1009" x2="247.6321" y1="177.6158" y2="177.6158"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.9271" x="43.1009" y="171.8068">LOCK [region 1]</text><polygon fill="#181818" points="47.1009,205.3218,37.1009,209.3218,47.1009,213.3218,43.1009,209.3218" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="41.1009" x2="252.6321" y1="209.3218" y2="209.3218"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.5911" x="53.1009" y="203.5128">LOCK_GRANT [lease_ms]</text><polygon fill="#181818" points="264.6321,237.0278,254.6321,241.0278,264.6321,245.0278,260.6321,241.0278" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="258.6321" x2="491.7043" y1="241.0278" y2="241.0278"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="215.0722" x="270.6321" y="235.2188">MEM_WRITE [ref in region 1][bytes]</text><polygon fill="#181818" points="480.7043,268.7338,490.7043,272.7338,480.7043,276.7338,484.7043,272.7338" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="253.6321" x2="486.7043" y1="272.7338" y2="272.7338"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="103.5191" x="260.6321" y="266.9248">ERROR [LOCKED]</text><path d="M497,285.7338 L497,330.7338 L754,330.7338 L754,295.7338 L744,285.7338 L497,285.7338 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M744,285.7338 L744,295.7338 L754,295.7338 L744,285.7338 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="236.4443" x="503" y="304.6308">module sees WASP_REMOTE_ELOCKED</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="114.4261" x="503" y="322.3369">&#8212; retry or back off</text><polygon fill="#181818" points="264.6321,355.8519,254.6321,359.8519,264.6321,363.8519,260.6321,359.8519" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="258.6321" x2="491.7043" y1="359.8519" y2="359.8519"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.9271" x="270.6321" y="354.0429">LOCK [region 1]</text><polygon fill="#181818" points="480.7043,387.5579,490.7043,391.5579,480.7043,395.5579,484.7043,391.5579" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="253.6321" x2="486.7043" y1="391.5579" y2="391.5579"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="103.5191" x="260.6321" y="385.7489">ERROR [LOCKED]</text><polygon fill="#181818" points="241.6321,419.2639,251.6321,423.2639,241.6321,427.2639,245.6321,423.2639" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="36.1009" x2="247.6321" y1="423.2639" y2="423.2639"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.3101" x="43.1009" y="417.4549">UNLOCK [region 1]</text><polygon fill="#181818" points="47.1009,450.9699,37.1009,454.9699,47.1009,458.9699,43.1009,454.9699" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="41.1009" x2="252.6321" y1="454.9699" y2="454.9699"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="61.1521" x="53.1009" y="449.1609">MEM_ACK</text><polygon fill="#181818" points="264.6321,482.6759,254.6321,486.6759,264.6321,490.6759,260.6321,486.6759" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="258.6321" x2="491.7043" y1="486.6759" y2="486.6759"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="136.5002" x="270.6321" y="480.8669">LOCK [region 1] (retry)</text><polygon fill="#181818" points="480.7043,514.382,490.7043,518.382,480.7043,522.382,484.7043,518.382" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="253.6321" x2="486.7043" y1="518.382" y2="518.382"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.5911" x="260.6321" y="512.573">LOCK_GRANT [lease_ms]</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1.0;" width="759.4443" x="0" y="548.235"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="759.4443" y1="548.235" y2="548.235"/><line style="stroke:#000000;stroke-width:1.0;" x1="0" x2="759.4443" y1="551.235" y2="551.235"/><rect fill="#EEEEEE" height="25.706" style="stroke:#000000;stroke-width:2.0;" width="450.2543" x="154.595" y="536.382"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="432.8743" x="160.595" y="554.279">Queued locks (coordinator policy &#8212; WaspNode(queue_locks=True))</text><polygon fill="#181818" points="241.6321,591.794,251.6321,595.794,241.6321,599.794,245.6321,595.794" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="36.1009" x2="247.6321" y1="595.794" y2="595.794"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.9271" x="43.1009" y="589.985">LOCK [region 1]</text><polygon fill="#181818" points="47.1009,623.5,37.1009,627.5,47.1009,631.5,43.1009,627.5" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="41.1009" x2="252.6321" y1="627.5" y2="627.5"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.5911" x="53.1009" y="621.691">LOCK_GRANT [lease_ms]</text><polygon fill="#181818" points="264.6321,655.206,254.6321,659.206,264.6321,663.206,260.6321,659.206" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="258.6321" x2="491.7043" y1="659.206" y2="659.206"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="95.9271" x="270.6321" y="653.397">LOCK [region 1]</text><path d="M96,672.206 L96,788.206 L410,788.206 L410,682.206 L400,672.206 L96,672.206 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M400,672.206 L400,682.206 L410,682.206 L400,672.206 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.2442" x="102" y="691.103">Instead of failing fast, the coordinator</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="36.504" x="102" y="708.8091">parks</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="193.5702" x="141.884" y="708.8091">B's request in the region's FIFO.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="248.7943" x="102" y="726.5151">B's executor just blocks on its RPC slot &#8212;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="293.3063" x="102" y="744.2211">the node needs no opinion, no protocol change.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.8822" x="102" y="761.9271">The wait is bounded (4 s &lt; the node's 5 s</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="274.8333" x="102" y="779.6331">RPC timeout), then ERROR [LOCKED] after all.</text><polygon fill="#181818" points="241.6321,813.1481,251.6321,817.1481,241.6321,821.1481,245.6321,817.1481" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;" x1="36.1009" x2="247.6321" y1="817.1481" y2="817.1481"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="115.3101" x="43.1009" y="811.3391">UNLOCK [region 1]</text><polygon fill="#181818" points="47.1009,844.8542,37.1009,848.8542,47.1009,852.8542,43.1009,848.8542" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="41.1009" x2="252.6321" y1="848.8542" y2="848.8542"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="61.1521" x="53.1009" y="843.0452">MEM_ACK</text><polygon fill="#181818" points="480.7043,911.9722,490.7043,915.9722,480.7043,919.9722,484.7043,915.9722" style="stroke:#181818;stroke-width:1.0;"/><line style="stroke:#181818;stroke-width:1.0;stroke-dasharray:2.0,2.0;" x1="253.6321" x2="486.7043" y1="915.9722" y2="915.9722"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.5911" x="260.6321" y="874.7512">LOCK_GRANT [lease_ms]</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="213.6032" x="260.6321" y="892.4572">(sent the moment the region frees;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="126.8801" x="260.6321" y="910.1632">the lease clock starts</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="27.716" x="390.8922" y="910.1632">now</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="3.9" x="418.6082" y="910.1632">)</text><path d="M497,928.9722 L497,973.9722 L707,973.9722 L707,938.9722 L697,928.9722 L497,928.9722 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M697,928.9722 L697,938.9722 L707,938.9722 L697,928.9722 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.7991" x="503" y="947.8692">zero wasted round-trips,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.4102" x="503" y="965.5752">FIFO fairness under contention</text><rect fill="#EEEEEE" height="3" style=