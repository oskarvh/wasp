# Board-agnostic configuration. Per-board tuning goes in boards/<board>.conf.

# --- WASM runtime ---
CONFIG_WAMR=y

# --- logging ---
CONFIG_LOG=y

# --- networking ---
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
# SO_RCVTIMEO/SO_SNDTIMEO support (drop peers that stall mid-frame)
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_CONTEXT_SNDTIMEO=y

# --- kernel ---
CONFIG_REBOOT=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
