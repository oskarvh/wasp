# Raspberry Pi Pico W (RP2040 Cortex-M0+ @ 133 MHz, 264 KiB SRAM, 2 MB
# flash, CYW43439 WiFi). Per-board tuning only — keep anything
# board-agnostic in prj.conf.

# WiFi — CYW43439 via the Infineon AIROC driver (defaults on once WIFI
# is enabled; firmware blobs required once: `west blobs fetch hal_infineon`).
# Credentials come from the gitignored app/wifi_credentials.conf.
CONFIG_WIFI=y

# RP2040 has no hardware TRNG. Pseudo-random suffices for a LAN test
# node (TCP sequence numbers, DHCP ids — nothing cryptographic).
CONFIG_TEST_RANDOM_GENERATOR=y

# Console on USB CDC ACM — the Pico W has no on-board UART-to-USB bridge
# (same configuration as the upstream cdc-acm-console snippet).
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_UART_LINE_CTRL=y
